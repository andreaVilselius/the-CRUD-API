<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
  </head>
  <body>
    <div id="app">
      <div class="forms">
        <div class="row1">
          <form id="addOrderForm">
            <input type="text" placeholder="Namn" id="name" required />

            <input type="text" id="address" placeholder="Address" required />

            <button type="submit">Lägg till beställning</button>
          </form>

          <form id="searchOrder">
            <input type="text" id="id" placeholder="Id" />
            <button type="submit">Sök beställning</button>
          </form>
        </div>
        <div class="row2">
          <form id="readOrders">
            <button type="submit">Se alla beställningar</button>
          </form>

          <div class="sortDiv">
            <select name="sortOrderSelect" id="sort">
              <option value="asc">sortera ö-a</option>
              <option value="desc">sortera a-ö</option>
            </select>
          </div>
        </div>
      </div>

      <ul id="orders"></ul>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
